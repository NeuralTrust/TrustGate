apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: agentgateway
resources:
- ../../base
- secretproviderclass/agentgateway-secrets.yaml
patchesStrategicMerge:
- patches/replicas-patch.yaml
- patches/resources-patch.yaml
# - patches/hpa-patch.yaml
- patches/pdb-patch.yaml
# - patches/ingress-patch.yaml  # disabled - using Gateway API
- patches/httproute-patch.yaml
- patches/sa-annotation-patch.yaml
commonLabels:
  environment: prod
  app.kubernetes.io/managed-by: kustomize
namespace: agentgateway
images:
- name: agentgateway
  newName: europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/agentgateway
  newTag: latest
configMapGenerator:
- name: agentgateway-config
  envs:
  - config.env
  behavior: create
