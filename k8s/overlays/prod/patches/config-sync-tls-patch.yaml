# Config-sync gRPC TLS for prod. The channel carries registry credentials and
# key hashes, so it must not be plaintext in a deployed environment (config
# validation rejects CONFIG_SYNC_TLS_INSECURE=true when APP_ENV=prod).
#
# The cert/key/CA are managed by cert-manager (Let's Encrypt via Cloudflare
# DNS-01), NOT GCP Secret Manager: config-sync-cert.yaml issues a public server
# cert for agentgateway-configsync.neuraltrust.ai. The admin (control plane)
# mounts that Secret and terminates TLS; every data plane (proxy/mcp in-cluster
# and remote hybrid) trusts the public root store (CONFIG_SYNC_TLS_CA empty) and
# pins the public SNI.
#
# In-cluster data planes keep dialing the internal Service (no hairpin via the
# external LB) but override the SNI to the public hostname so the single public
# leaf validates - the dial target (CONFIG_SYNC_GRPC_ENDPOINT, in config.env) and
# the verified name (CONFIG_SYNC_TLS_SERVER_NAME) are independent.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentgateway-admin
spec:
  template:
    spec:
      containers:
      - name: admin
        env:
        - name: CONFIG_SYNC_GRPC_TLS_CERT
          value: /etc/config-sync-tls/tls.crt
        - name: CONFIG_SYNC_GRPC_TLS_KEY
          value: /etc/config-sync-tls/tls.key
        volumeMounts:
        - name: config-sync-tls
          mountPath: /etc/config-sync-tls
          readOnly: true
      volumes:
      - name: config-sync-tls
        secret:
          secretName: agentgateway-config-sync-tls
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentgateway-proxy
spec:
  template:
    spec:
      containers:
      - name: proxy
        env:
        - name: CONFIG_SYNC_TLS_INSECURE
          value: "false"
        # Empty CA => verify against the system root store (Let's Encrypt is
        # publicly trusted). No CA file is mounted on the data plane.
        - name: CONFIG_SYNC_TLS_CA
          value: ""
        # Override the verified name to the public cert SAN while still dialing
        # the internal Service (CONFIG_SYNC_GRPC_ENDPOINT in config.env).
        - name: CONFIG_SYNC_TLS_SERVER_NAME
          value: agentgateway-configsync.neuraltrust.ai
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentgateway-mcp
spec:
  template:
    spec:
      containers:
      - name: mcp
        env:
        - name: CONFIG_SYNC_TLS_INSECURE
          value: "false"
        - name: CONFIG_SYNC_TLS_CA
          value: ""
        - name: CONFIG_SYNC_TLS_SERVER_NAME
          value: agentgateway-configsync.neuraltrust.ai
