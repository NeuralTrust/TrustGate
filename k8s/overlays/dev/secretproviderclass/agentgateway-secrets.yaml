apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: agentgateway-secrets
  labels:
    app.kubernetes.io/instance: agentgateway
spec:
  provider: gke
  # Materialize a Kubernetes Secret from the mounted GCP secrets so the
  # deployments can consume them via `envFrom: secretRef`.
  secretObjects:
  - secretName: agentgateway-secrets
    type: Opaque
    data:
    - objectName: DB_HOST
      key: DB_HOST
    - objectName: DB_NAME
      key: DB_NAME
    - objectName: DB_USER
      key: DB_USER
    - objectName: REDIS_HOST
      key: REDIS_HOST
    - objectName: KAFKA_BROKERS
      key: KAFKA_BROKERS
    - objectName: DB_PASSWORD
      key: DB_PASSWORD
    - objectName: REDIS_PASSWORD
      key: REDIS_PASSWORD
    - objectName: SERVER_SECRET_KEY
      key: SERVER_SECRET_KEY
  parameters:
    secrets: |
      - resourceName: projects/neuraltrust-app-dev/secrets/agentgateway-db-host/versions/latest
        path: DB_HOST
      - resourceName: projects/neuraltrust-app-dev/secrets/agentgateway-db-name/versions/latest
        path: DB_NAME
      - resourceName: projects/neuraltrust-app-dev/secrets/agentgateway-db-user/versions/latest
        path: DB_USER
      - resourceName: projects/neuraltrust-app-dev/secrets/agentgateway-redis-host/versions/latest
        path: REDIS_HOST
      - resourceName: projects/neuraltrust-app-dev/secrets/agentgateway-kafka-brokers/versions/latest
        path: KAFKA_BROKERS
      - resourceName: projects/neuraltrust-app-dev/secrets/agentgateway-db-password/versions/latest
        path: DB_PASSWORD
      - resourceName: projects/neuraltrust-app-dev/secrets/agentgateway-redis-password/versions/latest
        path: REDIS_PASSWORD
      - resourceName: projects/neuraltrust-app-dev/secrets/agentgateway-server-secret-key/versions/latest
        path: SERVER_SECRET_KEY
