apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: agentgateway
# config-sync gRPC public endpoint (hybrid data planes) + its cert-manager cert
resources:
- ../../base
- secretproviderclass/agentgateway-secrets.yaml
- service-configsync-external.yaml
- config-sync-cert.yaml
# - patches/hpa-patch.yaml
patchesStrategicMerge:
- patches/replicas-patch.yaml
- patches/resources-patch.yaml
- patches/pdb-patch.yaml
- patches/httproute-patch.yaml
- patches/sa-annotation-patch.yaml
- patches/config-sync-tls-patch.yaml
commonLabels:
  app.kubernetes.io/managed-by: kustomize
  environment: dev
namespace: agentgateway
images:
- name: agentgateway
  newName: europe-west1-docker.pkg.dev/neuraltrust-app-dev/nt-docker/agentgateway
  newTag: 591a86f1bed95c51458ccd0385ab00a775cae466
configMapGenerator:
- behavior: create
  envs:
  - config.env
  name: agentgateway-config
- behavior: create
  files:
  - telemetry.yaml
  name: agentgateway-telemetry
