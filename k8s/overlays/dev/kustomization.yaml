apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: agentgateway
resources:
- ../../base
- secretproviderclass/agentgateway-secrets.yaml
patchesStrategicMerge:
- patches/replicas-patch.yaml
- patches/resources-patch.yaml
# - patches/hpa-patch.yaml
- patches/pdb-patch.yaml
- patches/httproute-patch.yaml
- patches/sa-annotation-patch.yaml
commonLabels:
  environment: dev
  app.kubernetes.io/managed-by: kustomize
namespace: agentgateway
images:
- name: agentgateway
  newName: europe-west1-docker.pkg.dev/neuraltrust-app-dev/nt-docker/agentgateway
  newTag: 6f552a3ec8d9a4f2fb09ccfd29dc403b02dccd95
configMapGenerator:
- name: agentgateway-config
  envs:
  - config.env
  behavior: create
