apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentgateway-admin
  labels:
    app.kubernetes.io/instance: agentgateway
    app.kubernetes.io/component: admin
    component: admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: agentgateway
      app.kubernetes.io/component: admin
      component: admin
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: agentgateway
        app.kubernetes.io/component: admin
        component: admin
    spec:
      serviceAccountName: agentgateway
      containers:
      - name: admin
        image: agentgateway
        workingDir: /app
        args:
        - admin
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: agentgateway-config
        ports:
        - containerPort: 8080
          name: http
        # Config-sync gRPC listener (CONFIG_SYNC_GRPC_LISTEN_ADDR): the control
        # plane serves compiled snapshots to the DB-less proxy/mcp data planes.
        - containerPort: 8083
          name: grpc
        resources:
          limits:
            cpu: 200m
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 1Gi
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
        volumeMounts:
        - name: agentgateway-secrets
          mountPath: /etc/secrets
          readOnly: true
      securityContext: {}
      volumes:
      - name: agentgateway-secrets
        csi:
          driver: secrets-store-gke.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: agentgateway-secrets
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - agentgateway-admin
            topologyKey: kubernetes.io/hostname
