apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentgateway-proxy
  labels:
    app.kubernetes.io/instance: agentgateway
    app.kubernetes.io/component: proxy
    component: proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: agentgateway
      app.kubernetes.io/component: proxy
      component: proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: agentgateway
        app.kubernetes.io/component: proxy
        component: proxy
    spec:
      serviceAccountName: agentgateway
      containers:
      - name: proxy
        image: agentgateway
        # Distroless image has no /bin/sh; secrets load via godotenv from /etc/secrets/.env.
        workingDir: /app
        args:
        - proxy
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: agentgateway-config
        env:
        # Run the proxy as a DB-less data plane: no Postgres, config pulled from the
        # admin control plane over the config-sync gRPC transport (CONFIG_SYNC_GRPC_ENDPOINT
        # in config.env), plaintext on the in-cluster service.
        - name: CONFIG_SYNC_DATA_PLANE_ENABLED
          value: "true"
        - name: CONFIG_SYNC_TLS_INSECURE
          value: "true"
        ports:
        - containerPort: 8081
          name: http
        resources:
          limits:
            cpu: 2000m
            memory: 4Gi
          requests:
            cpu: 1000m
            memory: 2Gi
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
        volumeMounts:
        - name: agentgateway-secrets
          mountPath: /etc/secrets
          readOnly: true
        - name: config-sync-lkg
          mountPath: /var/lib/trustgate
        - name: telemetry-exporters
          mountPath: /etc/telemetry
          readOnly: true
      securityContext: {}
      volumes:
      - name: agentgateway-secrets
        csi:
          driver: secrets-store-gke.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: agentgateway-secrets
      # Default telemetry exporters (TELEMETRY_EXPORTERS_FILE); generated per
      # overlay from telemetry.yaml so each environment can ship its own set.
      - name: telemetry-exporters
        configMap:
          name: agentgateway-telemetry
      # Encrypted last-known-good snapshot cache; survives control-plane outages
      # within the pod lifetime (ephemeral: repopulated from the CP pull on restart).
      - name: config-sync-lkg
        emptyDir: {}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - agentgateway-proxy
            topologyKey: kubernetes.io/hostname
