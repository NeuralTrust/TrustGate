apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: agentgateway-admin-healthcheck
spec:
  default:
    checkIntervalSec: 15
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 2
    config:
      type: HTTP
      httpHealthCheck:
        port: 8080
        requestPath: /health
  targetRef:
    group: ""
    kind: Service
    name: agentgateway-admin
---
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: agentgateway-proxy-healthcheck
spec:
  default:
    checkIntervalSec: 15
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 2
    config:
      type: HTTP
      httpHealthCheck:
        port: 8081
        requestPath: /health
  targetRef:
    group: ""
    kind: Service
    name: agentgateway-proxy
