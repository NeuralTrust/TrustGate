version: "2"

run:
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
  exclusions:
    paths:
      - vendor
      - ".*\\.pb\\.go$"
      - ".*_gen\\.go$"
    rules:
      - linters:
          - errcheck
        text: "Error return value of `.*Close` is not checked"
