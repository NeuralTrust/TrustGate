syntax = "proto3";

package snapshotpb;

option go_package = "github.com/NeuralTrust/TrustGate/pkg/infra/configsnapshot/proto;snapshotpb";

// ConfigSync is the DP-initiated config-sync transport. The data plane dials the
// control plane (egress-only) and holds one long-lived Sync stream for change
// notices and acks; it pulls the compiled snapshot out-of-band via GetSnapshot.
service ConfigSync {
  // Sync is the long-lived control channel: the data plane sends Hello, then reads
  // VersionNotice messages and replies with Ack after each successful swap.
  rpc Sync(stream ClientMessage) returns (stream ServerMessage);

  // GetSnapshot streams the current compiled snapshot as ordered byte chunks. The
  // first message is a SnapshotHeader; when the applied version already matches the
  // header carries not_modified=true and no data chunks follow.
  rpc GetSnapshot(GetSnapshotRequest) returns (stream SnapshotChunk);
}

message ClientMessage {
  oneof msg {
    Hello hello = 1;
    Ack ack = 2;
  }
}

message Hello {
  string instance_id = 1;
  string last_applied_version = 2;
}

message Ack {
  string applied_version = 1;
}

message ServerMessage {
  oneof msg {
    VersionNotice notice = 1;
  }
}

message VersionNotice {
  string version = 1;
}

message GetSnapshotRequest {
  string applied_version = 1;
  string instance_id = 2;
}

message SnapshotChunk {
  oneof payload {
    SnapshotHeader header = 1;
    bytes data = 2;
  }
}

message SnapshotHeader {
  string version = 1;
  bool not_modified = 2;
  int64 total_bytes = 3;
}
