syntax = "proto3";

package snapshotpb;

option go_package = "github.com/NeuralTrust/TrustGate/pkg/infra/configsnapshot/proto;snapshotpb";

//go:generate go run github.com/bufbuild/buf/cmd/buf@v1.50.0 generate

message Snapshot {
  string version = 1;
  repeated Gateway gateways = 2;
  repeated Consumer consumers = 3;
  repeated Registry registries = 4;
  repeated Policy policies = 5;
  repeated Auth auths = 6;
  repeated Role roles = 7;
  repeated Provider providers = 8;
  repeated CatalogModel catalog_models = 9;
}

message Gateway {
  bytes json = 1;
}

message Consumer {
  bytes json = 1;
}

message Registry {
  bytes json = 1;
}

message Policy {
  bytes json = 1;
}

message Auth {
  bytes json = 1;
  string key_hash = 2;
}

message Role {
  bytes json = 1;
}

message Provider {
  bytes json = 1;
}

message CatalogModel {
  bytes json = 1;
  string provider_code = 2;
}
