name: Auto Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
      - '.github/**'

permissions:
  contents: write

jobs:
  release:
    uses: NeuralTrust/workflows/.github/workflows/ai-release-bump.yml@main
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
