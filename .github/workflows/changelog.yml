# Appends a one-line entry per openspec proposal touched by the merged PR to
# `## [Unreleased]` in CHANGELOG.md. See:
#   https://github.com/NeuralTrust/workflows/blob/main/README.md#openspec-changelog-feed
#
# Promotion from `## [Unreleased]` to `## [vX.Y.Z] — YYYY-MM-DD` happens in
# `auto-release.yml` (via `ai-release-bump.yml`).

name: OpenSpec Changelog Feed

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  feed:
    if: github.event.pull_request.merged == true
    uses: NeuralTrust/workflows/.github/workflows/openspec-changelog.yml@main
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
