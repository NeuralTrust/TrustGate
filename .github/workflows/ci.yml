name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write
  checks: read
  security-events: write
  actions: read
  id-token: write

jobs:
  license-check:
    name: License Headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true
      - name: Install addlicense
        run: go install github.com/google/addlicense@latest
      - name: Check license headers
        run: make license-check

  unit-tests:
    uses: NeuralTrust/workflows/.github/workflows/tests.yml@main
    with:
      language: go
      language_version: "1.26.4"
      go_private_modules: true
      lint_enabled: true
      coverage_enabled: true
      test_command: |
        go test -v -race -coverprofile=unit-coverage.txt -covermode=atomic ./pkg/...
      setup_commands: |
        cp .env.example .env
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

  metrics-module:
    name: Metrics Schema Module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true
      - name: Build, vet and test pkg/metrics
        working-directory: pkg/metrics
        run: |
          go build ./...
          go vet ./...
          go test -race ./...
      - name: Lint pkg/metrics
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: pkg/metrics

  functional-tests:
    name: Functional Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
      postgres:
        image: postgres:13
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          check-latest: true
          cache: true

      - name: Install service check tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client redis-tools

      - name: Wait for services to be ready
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          for i in {1..120}; do
            if PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d postgres -c "SELECT 1;" > /dev/null 2>&1; then
              echo "PostgreSQL is ready!"
              break
            fi
            if [ $i -eq 120 ]; then
              echo "PostgreSQL failed to start after 120 seconds"
              exit 1
            fi
            echo "PostgreSQL is not ready yet, waiting... ($i/120)"
            sleep 1
          done

          echo "Waiting for Redis to be ready..."
          for i in {1..120}; do
            if redis-cli -h localhost -p 6379 ping > /dev/null 2>&1; then
              echo "Redis is ready!"
              break
            fi
            if [ $i -eq 120 ]; then
              echo "Redis failed to start after 120 seconds"
              exit 1
            fi
            echo "Redis is not ready yet, waiting... ($i/120)"
            sleep 1
          done

          echo "All services are ready!"

      - name: Copy environment files
        run: |
          cp .env.example .env
          cp .env.functional.example .env.functional

      - name: Inject functional test secrets
        run: |
          echo "" >> .env.functional
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env.functional

      - name: Create repository integration test database
        run: |
          PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d postgres \
            -c "CREATE DATABASE trustgate_repo_test;" || true

      - name: Create sensible exporter integration test database
        run: |
          PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d postgres \
            -c "CREATE DATABASE sensible_pg_test;" || true

      - name: Run Functional tests
        env:
          PG_TEST_URL: postgres://postgres:postgres@localhost:5432/trustgate_repo_test?sslmode=disable
        run: go test -tags functional -v -race -count=1 -p 1 ./tests/functional/...

      - name: Run Postgres exporter integration tests
        env:
          SENSIBLE_PG_TEST_DSN: postgres://postgres:postgres@localhost:5432/sensible_pg_test?sslmode=disable
        run: go test -tags integration -race -count=1 ./pkg/infra/telemetry/postgres/...

  scripts-tests:
    name: CI Scripts Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test metrics module version bump
        run: bash .github/scripts/next-metrics-version.test.sh

  security:
    uses: NeuralTrust/workflows/.github/workflows/sast.yml@main
    with:
      gitleaks_enabled: true
      gosec_enabled: true
      gosec_args: "-severity high ./..."
