name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write
  checks: read
  security-events: write
  id-token: write

jobs:
  unit-tests:
    uses: NeuralTrust/workflows/.github/workflows/tests.yml@main
    with:
      language: go
      language_version: "1.26"
      go_private_modules: true
      lint_enabled: true
      coverage_enabled: true
      test_command: |
        go test -v -race -coverprofile=unit-coverage.txt -covermode=atomic ./pkg/...
      setup_commands: |
        cp .env.example .env
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

  functional-tests:
    name: Functional Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
      postgres:
        image: postgres:13
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true
          cache: true

      - name: Install service check tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client redis-tools

      - name: Wait for services to be ready
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          for i in {1..120}; do
            if PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d postgres -c "SELECT 1;" > /dev/null 2>&1; then
              echo "PostgreSQL is ready!"
              break
            fi
            if [ $i -eq 120 ]; then
              echo "PostgreSQL failed to start after 120 seconds"
              exit 1
            fi
            echo "PostgreSQL is not ready yet, waiting... ($i/120)"
            sleep 1
          done

          echo "Waiting for Redis to be ready..."
          for i in {1..120}; do
            if redis-cli -h localhost -p 6379 ping > /dev/null 2>&1; then
              echo "Redis is ready!"
              break
            fi
            if [ $i -eq 120 ]; then
              echo "Redis failed to start after 120 seconds"
              exit 1
            fi
            echo "Redis is not ready yet, waiting... ($i/120)"
            sleep 1
          done

          echo "All services are ready!"

      - name: Copy environment files
        run: |
          cp .env.example .env
          cp .env.functional.example .env.functional

      - name: Run Functional tests
        run: go test -v -race -count=1 ./tests/functional/

  security:
    uses: NeuralTrust/workflows/.github/workflows/sast.yml@main
    with:
      gitleaks_enabled: false
      gosec_enabled: true
      gosec_args: "-no-fail ./..."
